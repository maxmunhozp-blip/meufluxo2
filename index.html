    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MeuFluxo",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "description": "Gestão de tarefas projetada para cérebros com TDAH e TEA. Baseada em ciência, sem sobrecarga cognitiva.",
      "url": "https://meufluxo2.lovable.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "BRL"
      }
    }
    </script>

    <!-- FOUC prevention: apply theme before first paint -->
    <script>
      (function() {
        var stored = localStorage.getItem('meufluxo-theme');
        var theme = stored || 'dark';
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#F5F0E8' : '#0A0A0C');
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
